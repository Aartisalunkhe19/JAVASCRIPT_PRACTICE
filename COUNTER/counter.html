<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
    <title>COUNTER</title>
</head>
<body>
    <h1 id="h">WELCOME TO COUNTER</h1>
    <div id="d1">
            <p id="count" style="font-size:40px;">0</p>

<button onclick="increaseCount()" id="b1">+</button>
<button onclick="decreaseCount()" id="b2">-</button>
<div id="d2">
<button onclick="resetCount()" id="b3">Reset</button>
<button onclick="saveCount()" id="b4">Save</button>
<button onclick="loadCount()" id="b5">Load</button>
</div>
    </div>
    <script>
        let count = 0;

// Function to display the counter
function updateCount() {
  document.getElementById("count").innerHTML = count;
}

// Function to increase the counter
function increaseCount() {
  count++;
  updateCount();
}

// Function to decrease the counter
function decreaseCount() {
  count--;
  updateCount();
}

// Function to reset the counter
function resetCount() {
  count = 0;
  updateCount();
}

// Function to save the counter
function saveCount() {
  localStorage.setItem("count", count);
}

// Function to load the counter
function loadCount() {
  let saved = localStorage.getItem("count");
  if (saved !== null) {
    count = Number(saved);
  }
  updateCount();
}

    </script>
</body>
</html>
